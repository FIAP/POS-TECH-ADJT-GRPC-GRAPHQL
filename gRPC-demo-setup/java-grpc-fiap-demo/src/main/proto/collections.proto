syntax = "proto3";

package collection;

option java_multiple_files = true;
option java_package = "dev.ghlima.demos.collection";


message Veiculo {
  string placa = 1;
  string modelo = 2;
  string marca = 3;
  int32 ano = 4;
}


message Frota {
  string nome = 1;
  repeated Veiculo veiculos = 2;
}


message ListaDeFrotas {
  repeated Frota frotas = 1;
}